spring:
  autoconfigure:
    exclude:
      - org.telegram.telegrambots.longpolling.starter.TelegramBotStarterConfiguration

backend:
  base-url: http://api-gateway-dev.dev.svc.cluster.local:8080

telegram:
  bot:
    webhook-path: "bot"
    webhook-base-url: "https://tg-bot-dev.actimate.ru/bot"

management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings
