spring:
  application:
    name: telegram-bot

  config:
    import:
      - optional:file:.env[.properties]
      - optional:configserver:http://${CONFIG_SERVER_USERNAME}:${CONFIG_SERVER_PASSWORD}@${CONFIG_SERVER_HOST:config-server}:${CONFIG_SERVER_PORT:8888}

  threads:
    virtual:
      enabled: true

  cloud:
    config:
      fail-fast: false
      retry:
        initial-interval: 1000
        max-interval: 2000
        max-attempts: 3
